ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.stockmate.ApplicationKt.module ]
    }
}

jwt {
    secret = "stockmate-secret-key-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "stockmate"
    audience = "stockmate-users"
    expiration = 3600
    refreshExpiration = 2592000
}

database {
    url = "jdbc:postgresql://localhost:5432/stockmate"
    url = ${?DATABASE_URL}
    user = "postgres"
    user = ${?DATABASE_USER}
    password = "postgres"
    password = ${?DATABASE_PASSWORD}
    driver = "org.postgresql.Driver"
}
